<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amdox Task Flow — Reports</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">📋</div><span class="logo-text">Amdox Task Flow</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Workspace</div>
      <a class="nav-link" href="/dashboard.html"><span class="nav-icon">⬡</span> Dashboard</a>
      <a class="nav-link" href="/pages/tasks.html"><span class="nav-icon">✓</span> All Tasks</a>
      <a class="nav-link" href="/pages/my-tasks.html"><span class="nav-icon">◎</span> My Tasks</a>
      <a class="nav-link" href="/pages/team.html"><span class="nav-icon">◈</span> Team</a>
      <a class="nav-link active" href="/pages/reports.html"><span class="nav-icon">◧</span> Reports</a>
      <div class="nav-section-label" style="margin-top:16px">Settings</div>
      <a class="nav-link" href="/pages/roles.html" id="nav-roles"><span class="nav-icon">◉</span> Roles &amp; Access</a>
      <a class="nav-link" href="#" onclick="logout()"><span class="nav-icon">→</span> Sign Out</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">AR</div>
      <div class="user-meta">
        <div class="user-name" id="user-name">Loading…</div>
        <div class="user-role" id="user-role">—</div>
      </div>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <h1 class="page-heading">Reports &amp; Analytics</h1>
      </div>
    </header>

    <main class="page-content">
      <!-- Summary Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card blue"><div class="stat-label">Total Tasks</div><div class="stat-value" id="r-total">—</div></div>
        <div class="stat-card green"><div class="stat-label">Completion Rate</div><div class="stat-value" id="r-rate">—</div></div>
        <div class="stat-card amber"><div class="stat-label">In Progress</div><div class="stat-value" id="r-progress">—</div></div>
        <div class="stat-card red"><div class="stat-label">Overdue</div><div class="stat-value" id="r-overdue">—</div></div>
      </div>

      <div class="dashboard-grid">
        <!-- Priority & Status breakdown -->
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Task Breakdown</span></div>
          <div class="panel-body">
            <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;
                        letter-spacing:.05em;margin-bottom:10px">By Priority</div>
            <div id="priority-bars"></div>
            <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;
                        letter-spacing:.05em;margin:18px 0 10px">By Status</div>
            <div id="status-bars"></div>
          </div>
        </div>

        <!-- Team Performance -->
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Team Performance</span></div>
          <div class="panel-body" id="team-perf">
            <div class="loading-spinner">Loading…</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  initUserUI();
  try {
    const r = await Tasks.report();
    document.getElementById('r-total').textContent    = r.totalTasks;
    document.getElementById('r-rate').textContent     = r.completionRate + '%';
    document.getElementById('r-progress').textContent = r.inProgressTasks;
    document.getElementById('r-overdue').textContent  = r.overdueTasks;

    // Priority bars
    const pColors = {CRITICAL:'var(--red)',HIGH:'var(--amber)',MEDIUM:'var(--blue)',LOW:'var(--green)'};
    document.getElementById('priority-bars').innerHTML = (r.byPriority || []).map(p => `
      <div class="progress-row">
        <div class="progress-label"><span>${priorityBadge(p.priority)}</span><span>${p.count}</span></div>
        <div class="progress-track"><div class="progress-fill"
          style="width:${r.totalTasks ? Math.round(p.count/r.totalTasks*100) : 0}%;background:${pColors[p.priority]||'var(--blue)'}"></div></div>
      </div>`).join('');

    // Status bars
    const sColors = {TODO:'var(--text3)',IN_PROGRESS:'var(--blue)',IN_REVIEW:'var(--purple)',DONE:'var(--green)'};
    document.getElementById('status-bars').innerHTML = (r.byStatus || []).map(s => `
      <div class="progress-row">
        <div class="progress-label"><span>${statusChip(s.status)}</span><span>${s.count}</span></div>
        <div class="progress-track"><div class="progress-fill"
          style="width:${r.totalTasks ? Math.round(s.count/r.totalTasks*100) : 0}%;background:${sColors[s.status]||'var(--blue)'}"></div></div>
      </div>`).join('');

    // Team performance
    document.getElementById('team-perf').innerHTML = (r.byUser || []).length
      ? (r.byUser || []).map((u, i) => `
          <div class="member-row">
            ${avatarHtml(getInitials(u.username), avatarColor(i), 34)}
            <div class="member-info">
              <div class="member-name">${escHtml(u.username)}</div>
              <div class="member-sub">${u.completed}/${u.total} completed (${u.completionRate}%)</div>
              <div class="progress-track" style="margin-top:5px">
                <div class="progress-fill" style="width:${u.completionRate}%;background:${avatarColor(i)}"></div>
              </div>
            </div>
            <div style="font-size:18px;font-weight:700;color:${avatarColor(i)}">${u.completionRate}%</div>
          </div>`).join('')
      : '<div class="empty-state-text" style="color:var(--text3);font-size:12px">No data yet</div>';
  } catch (e) {
    showToast('Failed to load report: ' + e.message, 'error');
  }
});

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
</script>
</body>
</html>
