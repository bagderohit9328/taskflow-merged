<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Register</title>
<link rel="stylesheet" href="/css/style.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
.auth-card {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:16px; padding:40px; width:100%; max-width:420px;
}
.auth-logo { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
.auth-logo-icon { width:40px; height:40px; background:linear-gradient(135deg,#1f6feb,#6e40c9);
  border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.auth-logo-text { font-size:22px; font-weight:700; color:var(--text); }
.auth-title { font-size:18px; font-weight:600; margin-bottom:6px; }
.auth-sub { font-size:13px; color:var(--text2); margin-bottom:24px; }
.form-group { margin-bottom:16px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-label { display:block; font-size:12px; font-weight:500; color:var(--text2);
  margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
.form-input {
  width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border .15s;
}
.form-input:focus { border-color:#1f6feb; }
.btn-auth {
  width:100%; padding:11px; background:linear-gradient(135deg,#1f6feb,#6e40c9);
  border:none; border-radius:8px; color:#fff; font-size:14px; font-weight:600;
  cursor:pointer; transition:opacity .15s; margin-top:8px;
}
.btn-auth:hover { opacity:.9; }
.auth-footer { text-align:center; margin-top:20px; font-size:13px; color:var(--text2); }
.auth-footer a { color:#58a6ff; text-decoration:none; }
.error-msg { background:#2d0f0f; border:1px solid rgba(248,81,73,.3);
  color:#f85149; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
.success-msg { background:#0d2d1a; border:1px solid rgba(63,185,80,.3);
  color:#3fb950; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon">📋</div>
    <div class="auth-logo-text">TaskFlow</div>
  </div>
  <div class="auth-title">Create your account</div>
  <div class="auth-sub">Join your team on TaskFlow</div>
  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>
  <div class="form-group">
    <label class="form-label">Full Name</label>
    <input class="form-input" type="text" id="fullName" placeholder="Alex Ray">
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="username" placeholder="alexray">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="alex@company.com">
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="form-input" type="password" id="password" placeholder="Min. 6 characters">
  </div>
  <button class="btn-auth" onclick="register()">Create Account</button>
  <div class="auth-footer">Already have an account? <a href="/index.html">Sign in</a></div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
