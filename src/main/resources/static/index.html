<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amdox Task Flow — Login</title>
<link rel="stylesheet" href="/css/style.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
.auth-card {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:16px; padding:40px; width:100%; max-width:400px;
}
.auth-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
.auth-logo-icon { width:40px; height:40px; background:linear-gradient(135deg,#1f6feb,#6e40c9);
  border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.auth-logo-text { font-size:22px; font-weight:700; color:var(--text); }
.auth-title { font-size:18px; font-weight:600; margin-bottom:6px; }
.auth-sub { font-size:13px; color:var(--text2); margin-bottom:28px; }
.form-group { margin-bottom:18px; }
.form-label { display:block; font-size:12px; font-weight:500; color:var(--text2);
  margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
.form-input {
  width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border .15s;
}
.form-input:focus { border-color:#1f6feb; }
.btn-auth {
  width:100%; padding:11px; background:linear-gradient(135deg,#1f6feb,#6e40c9);
  border:none; border-radius:8px; color:#fff; font-size:14px; font-weight:600;
  cursor:pointer; transition:opacity .15s; margin-top:8px;
}
.btn-auth:hover { opacity:.9; }
.auth-footer { text-align:center; margin-top:20px; font-size:13px; color:var(--text2); }
.auth-footer a { color:#58a6ff; text-decoration:none; }
.error-msg { background:#2d0f0f; border:1px solid rgba(248,81,73,.3);
  color:#f85149; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon">📋</div>
    <div class="auth-logo-text">Amdox Task Flow</div>
  </div>
  <div class="auth-title">Welcome back</div>
  <div class="auth-sub">Sign in to your workspace</div>
  <div class="error-msg" id="error-msg"></div>
  <div class="form-group">
    <label class="form-label">Email or Username</label>
    <input class="form-input" type="text" id="username" placeholder="you@example.com" autocomplete="username">
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-auth" onclick="login()">Sign In</button>
  <div class="auth-footer" style="display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;">
    <a href="/reset-password.html">Forgot password?</a>
    <span>Don't have an account? <a href="/register.html">Create one</a></span>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
