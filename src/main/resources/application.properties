# ============================================
# TaskFlow Application Configuration
# ============================================

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/taskflow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Reshab@4074
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Security
app.jwt.secret=TaskFlowSecretKey2024VeryLongSecretKeyForHS512AlgorithmMinimum64Chars!!
app.jwt.expiration-ms=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# Email (SMTP - configure with your provider)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.from=noreply@taskflow.com

# CORS — frontend served from same origin (port 8080)
app.cors.allowed-origins=http://localhost:8080

# Static Resources — Spring Boot serves frontend from src/main/resources/static/
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Scheduler
app.scheduler.deadline-check-cron=0 0 8 * * ?
