# ============================================
# Amdox Task Flow Application Configuration
# ============================================

# Server
server.port=${PORT:8080}

# Database
# Local default uses MySQL, Render production should set SPRING_DATASOURCE_* (Render Postgres recommended).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/taskflow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Reshab@4074}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Security
app.jwt.secret=TaskFlowSecretKey2024VeryLongSecretKeyForHS512AlgorithmMinimum64Chars!!
app.jwt.expiration-ms=86400000

# Password reset
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:8080}
app.password-reset.token-expiration-minutes=30

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# Email (SMTP - configure with your provider)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=bagderohit123@gmail.com
spring.mail.password=Reshabbag@4074
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Use your SMTP account as From by default (Gmail may block other From values)
app.email.from=${spring.mail.username}

# Dev-only: set true to include reset token in API response
app.password-reset.debug-return-token=false

# CORS — frontend served from same origin (port 8080)
app.cors.allowed-origins=http://localhost:8080

# Static Resources — Spring Boot serves frontend from src/main/resources/static/
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Scheduler
app.scheduler.deadline-check-cron=0 0 8 * * ?

# Actuator / Health checks
management.health.mail.enabled=false
